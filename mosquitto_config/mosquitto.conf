# Mosquitto MQTT Broker — NurseryHub Configuration
#
# SETUP INSTRUCTIONS (Windows):
#
# 1. Copy this file to: C:\Program Files\mosquitto\mosquitto.conf
#    (overwrite the existing one)
#
# 2. Create the password file — open Command Prompt as Administrator:
#
#      cd "C:\Program Files\mosquitto"
#      mosquitto_passwd -c passwordfile nursery_hub
#      (enter your MQTT password when prompted — must match config.exs)
#
#    To add the ESP32 device user:
#      mosquitto_passwd passwordfile esp32_device
#      (enter a password — must match MQTT_PASS in ESP32 firmware)
#
# 3. Restart Mosquitto:
#      net stop mosquitto
#      net start mosquitto

# ── Network ───────────────────────────────────────────────────────────────────
listener 1883 localhost
# Listens on localhost only. If ESP32s are on the same machine (unlikely),
# change to: listener 1883 0.0.0.0
# For remote ESP32s via internet, see VPN instructions in SECURITY_SETUP.md

# ── Authentication ────────────────────────────────────────────────────────────
# Reject any connection that doesn't provide valid credentials
allow_anonymous false
password_file C:\Program Files\mosquitto\passwordfile

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest file C:\Program Files\mosquitto\mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# ── Limits ────────────────────────────────────────────────────────────────────
# Maximum number of simultaneous connections
max_connections 100

# Maximum size of a single MQTT message (bytes)
# 1KB is more than enough for our sensor JSON payloads (~300 bytes)
message_size_limit 1024
